<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tecnovice Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="form-container">
        <form id="regform" novalidate>
            <h1 class="shine">CREATE AN ACCOUNT</h1>

            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="surname">Surname:</label>
            <input type="text" id="surname" name="surname" required>

            <label for="email">Email ADDRESS:</label>
            <input type="email" id="email" name="email" required>

            <label for="password">Enter Password:</label>
            <input type="password" id="password" name="password" required>

            <label for="repeatPassword">Repeat Password:</label>
            <input type="password" id="repeatPassword" name="repeatPassword" required>

            <button type="submit" id="submit">Register</button>

            <div class="form-footer" style="text-align:center; margin-top:12px;">
                <p style="color:#2cefef; margin:0;">
                    Already have an account? <a href="login.html" style="color:#c8bbdc; font-weight:700; text-decoration:none;">Login</a>
                </p>
            </div>
        </form>
    </div>

    <script src="script.js"></script>
</body>
